<style>
/* ============================================================
   PRELIMS PATH — UPSC CSE Preparation App
   Design tokens
   ============================================================ */
:root{
  --primary:#0D47A1;
  --primary-rgb:13,71,161;
  --accent:#1976D2;
  --accent-rgb:25,118,210;
  --success:#2E7D32;
  --warning:#F9A825;
  --danger:#C62828;
  --bg:#F5F7FA;
  --card:#FFFFFF;
  --text:#16202B;
  --text-dim:#5C6B7A;
  --text-faint:#8A97A6;
  --border:rgba(13,71,161,0.10);
  --shadow:0 1px 2px rgba(16,24,40,0.04), 0 4px 14px rgba(16,24,40,0.06);
  --shadow-lg:0 8px 28px rgba(16,24,40,0.12);
  --radius:16px;
  --radius-sm:10px;
  --radius-lg:22px;
  --font-display:'Fraunces','Georgia',serif;
  --font-body:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --fs-scale:1;
  --nav-h:68px;
  --top-h:58px;
  --omr-dot: rgba(13,71,161,0.05);
}
[data-theme="dark"]{
  --bg:#0E1420;
  --card:#161E2C;
  --text:#EAF0F8;
  --text-dim:#9FB0C3;
  --text-faint:#6C7C8F;
  --border:rgba(255,255,255,0.08);
  --shadow:0 1px 2px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.35);
  --shadow-lg:0 10px 32px rgba(0,0,0,0.5);
  --omr-dot: rgba(255,255,255,0.04);
}
*,*::before,*::after{box-sizing:border-box;}
html{-webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:calc(15px * var(--fs-scale));
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  transition:background .25s ease,color .25s ease;
}
@font-face{
  font-family:'Fraunces';
  src:local('Georgia');
}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;font-weight:600;letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit;}
::selection{background:rgba(var(--accent-rgb),0.25);}
a{color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;}

#app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:calc(var(--nav-h) + 14px);}

/* ---------------- Topbar ---------------- */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:10px;
  height:var(--top-h);padding:0 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.topbar .brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.brand-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(155deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.brand-mark::after{content:'';width:8px;height:8px;border-radius:50%;border:1.6px solid #fff;}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:1.02rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-btn{
  width:36px;height:36px;border-radius:50%;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);cursor:pointer;flex-shrink:0;
}
.topbar-btn:active{background:var(--border);}
.search-wrap{position:sticky;top:var(--top-h);z-index:39;background:var(--bg);padding:0 16px 10px;display:none;}
.search-wrap.open{display:block;}
.search-input{
  width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--text);outline:none;font-size:0.92rem;
}
.search-results{margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow:auto;}
.search-hit{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:0.85rem;cursor:pointer;}
.search-hit b{color:var(--accent);}
.search-hit .sh-meta{color:var(--text-faint);font-size:0.72rem;margin-top:2px;}

/* ---------------- Screens ---------------- */
main#screens{padding:14px 16px 6px;}
.screen{display:none;animation:fadeUp .32s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){.screen{animation:none;}*{transition:none !important;animation-duration:.001s !important;}}

.section-title{font-size:1.18rem;margin:22px 0 12px;display:flex;align-items:center;justify-content:space-between;}
.section-title span.tag{font-family:var(--font-body);font-size:0.68rem;font-weight:700;color:var(--text-faint);letter-spacing:.06em;text-transform:uppercase;}
.screen-header{padding:6px 0 4px;}
.screen-header h2{font-size:1.4rem;}
.screen-header p{color:var(--text-dim);font-size:0.85rem;margin-top:3px;}

/* ---------------- Cards ---------------- */
.card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.card + .card{margin-top:12px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-card{background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-card .stat-val{font-family:var(--font-display);font-size:1.5rem;font-weight:700;line-height:1.1;}
.stat-card .stat-label{font-size:0.7rem;color:var(--text-faint);margin-top:3px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;}
.stat-card .stat-icon{opacity:.55;}

/* ---------------- Hero / countdown ---------------- */
.hero{
  position:relative;overflow:hidden;border-radius:var(--radius-lg);
  background:linear-gradient(160deg,var(--primary) 0%,var(--accent) 100%);
  color:#fff;padding:22px 20px 20px;box-shadow:var(--shadow-lg);
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(var(--omr-dot-hero,rgba(255,255,255,0.16)) 1.6px, transparent 1.6px);
  background-size:14px 14px;opacity:.5;pointer-events:none;
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
.hero-date{font-size:0.78rem;opacity:.85;font-weight:600;letter-spacing:.02em;}
.hero-quote{font-size:0.78rem;opacity:.85;margin-top:2px;max-width:220px;font-style:italic;}
.countdown-ring{position:relative;width:84px;height:84px;flex-shrink:0;}
.countdown-ring svg{transform:rotate(-90deg);}
.countdown-ring .cr-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.countdown-ring .cr-num b{font-family:var(--font-display);font-size:1.35rem;line-height:1;}
.countdown-ring .cr-num small{font-size:0.55rem;opacity:.85;letter-spacing:.03em;}
.hero-days{font-family:var(--font-display);font-size:2.6rem;font-weight:700;margin-top:8px;line-height:1;position:relative;z-index:1;}
.hero-days span{font-size:1rem;font-family:var(--font-body);font-weight:600;opacity:.85;}
.hero-progress{margin-top:14px;position:relative;z-index:1;}
.hero-progress-bar{height:8px;border-radius:6px;background:rgba(255,255,255,0.25);overflow:hidden;}
.hero-progress-bar>div{height:100%;background:#fff;border-radius:6px;transition:width .5s ease;}
.hero-progress-label{display:flex;justify-content:space-between;font-size:0.72rem;margin-top:6px;opacity:.9;}

/* ---------------- Progress bars ---------------- */
.pbar{height:8px;border-radius:6px;background:var(--border);overflow:hidden;}
.pbar>div{height:100%;border-radius:6px;background:var(--accent);transition:width .4s ease;}
.pbar.thin{height:5px;}

/* ---------------- Buttons ---------------- */
.btn{
  border:none;border-radius:12px;padding:11px 16px;font-weight:700;font-size:0.86rem;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-ghost{background:var(--border);color:var(--text);}
.btn-outline{background:transparent;border:1.4px solid var(--border);color:var(--text);}
.btn-sm{padding:7px 11px;font-size:0.76rem;border-radius:9px;}
.btn-danger{background:rgba(198,40,40,0.12);color:var(--danger);}
.btn:active{transform:scale(0.97);}
.btn-block{width:100%;}
.quickgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px;}
.qbtn{
  display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--card);
  border:1px solid var(--border);border-radius:14px;padding:11px 4px;cursor:pointer;box-shadow:var(--shadow);
}
.qbtn .qicon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.qbtn span{font-size:0.64rem;font-weight:700;color:var(--text-dim);text-align:center;}
.qbtn:active{transform:scale(.95);}

/* ---------------- Bottom nav ---------------- */
.bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  max-width:560px;margin:0 auto;
  background:var(--card);border-top:1px solid var(--border);
  display:flex;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 14px rgba(16,24,40,0.06);
}
.navbtn{
  flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;color:var(--text-faint);cursor:pointer;position:relative;
}
.navbtn svg{width:21px;height:21px;}
.navbtn span{font-size:0.62rem;font-weight:700;}
.navbtn.active{color:var(--primary);}
[data-theme="dark"] .navbtn.active{color:var(--accent);}
.navbtn.active::before{content:'';position:absolute;top:2px;width:22px;height:3px;border-radius:3px;background:var(--accent);}

/* ---------------- More grid ---------------- */
.more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
.more-item{
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 8px;
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--shadow);text-align:center;
}
.more-item .mi-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.more-item span{font-size:0.72rem;font-weight:700;}

/* ---------------- Checklist / tasks ---------------- */
.task-row{
  display:flex;align-items:flex-start;gap:11px;padding:12px 4px;border-bottom:1px solid var(--border);
}
.task-row:last-child{border-bottom:none;}
.chk{
  width:22px;height:22px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;
}
.chk.done{background:var(--success);border-color:var(--success);}
.chk svg{opacity:0;width:13px;height:13px;}
.chk.done svg{opacity:1;}
.task-main{flex:1;min-width:0;}
.task-title{font-weight:700;font-size:0.88rem;}
.task-title.strike{text-decoration:line-through;color:var(--text-faint);}
.task-sub{font-size:0.76rem;color:var(--text-dim);margin-top:2px;}
.task-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
.pill{
  font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--border);color:var(--text-dim);
  display:inline-flex;align-items:center;gap:4px;
}
.pill.tier-high{background:rgba(198,40,40,0.12);color:var(--danger);}
.pill.tier-medium{background:rgba(249,168,37,0.16);color:#946200;}
.pill.tier-low{background:rgba(46,125,50,0.12);color:var(--success);}
.pill.dot::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}

/* ---------------- Chips / tabs ---------------- */
.tabbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.tabbar::-webkit-scrollbar{display:none;}
.tabchip{
  flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);
  font-size:0.78rem;font-weight:700;color:var(--text-dim);cursor:pointer;white-space:nowrap;
}
.tabchip.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* ---------------- Calendar ---------------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-head h3{font-size:1rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{font-size:0.62rem;font-weight:700;color:var(--text-faint);text-align:center;padding-bottom:4px;}
.cal-cell{
  aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:0.74rem;font-weight:700;cursor:pointer;position:relative;background:var(--bg);color:var(--text-dim);
  border:1.5px solid transparent;
}
.cal-cell.out{opacity:.25;pointer-events:none;}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.selected{background:var(--primary);color:#fff;}
.cal-cell .dot-row{display:flex;gap:2px;margin-top:2px;}
.cal-cell .dot-row .d{width:4px;height:4px;border-radius:50%;background:var(--success);}
.cal-cell.exam{background:var(--danger);color:#fff;}

/* ---------------- Forms ---------------- */
.field{margin-bottom:12px;}
.field label{display:block;font-size:0.74rem;font-weight:700;color:var(--text-dim);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border-radius:10px;border:1.4px solid var(--border);
  background:var(--bg);color:var(--text);outline:none;
}
.field textarea{resize:vertical;min-height:70px;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}

/* ---------------- Modal ---------------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(10,15,25,0.5);z-index:100;display:none;
  align-items:flex-end;justify-content:center;
}
.modal-backdrop.open{display:flex;}
.modal{
  background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;
  padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto;
  animation:slideUp .28s ease;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:38px;height:4px;border-radius:3px;background:var(--border);margin:0 auto 14px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h3{font-size:1.05rem;}

/* ---------------- Toast ---------------- */
.toast{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 16px);transform:translateX(-50%) translateY(20px);
  background:#16202B;color:#fff;padding:11px 18px;border-radius:30px;font-size:0.82rem;font-weight:600;
  z-index:200;opacity:0;pointer-events:none;transition:all .28s ease;box-shadow:var(--shadow-lg);
  max-width:88%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------------- Misc ---------------- */
.empty-state{text-align:center;padding:34px 14px;color:var(--text-faint);}
.empty-state svg{opacity:.4;margin-bottom:10px;}
.empty-state p{font-size:0.84rem;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.row-between{display:flex;justify-content:space-between;align-items:center;}
.muted{color:var(--text-faint);font-size:0.76rem;}
.badge-count{background:var(--danger);color:#fff;font-size:0.6rem;font-weight:800;border-radius:20px;padding:1px 6px;margin-left:4px;}
.subject-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-family:var(--font-display);font-weight:700;}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--border);cursor:pointer;}
.list-item:last-child{border-bottom:none;}
.list-item-body{flex:1;min-width:0;}
.list-item-title{font-weight:700;font-size:0.88rem;}
.list-item-sub{font-size:0.75rem;color:var(--text-dim);margin-top:2px;}
.chev{color:var(--text-faint);flex-shrink:0;}
.switch{position:relative;width:44px;height:25px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch .sl{position:absolute;inset:0;background:var(--border);border-radius:30px;cursor:pointer;transition:.2s;}
.switch .sl::before{content:'';position:absolute;width:19px;height:19px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch input:checked + .sl{background:var(--accent);}
.switch input:checked + .sl::before{transform:translateX(19px);}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-dot.active{border-color:var(--text);}
canvas{max-width:100%;}

/* ---------------- Mentor Timeline ---------------- */
.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:12px;}
.tl-rail{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 0 0 4px var(--bg);}
.tl-line{width:2px;flex:1;background:var(--border);margin:2px 0;min-height:14px;}
.tl-item:last-child .tl-line{display:none;}
.tl-content{flex:1;min-width:0;padding-bottom:4px;}
.tl-time{font-size:0.68rem;font-weight:800;color:var(--text-faint);letter-spacing:.03em;text-transform:uppercase;padding-top:4px;}

.flash-card{
  background:linear-gradient(160deg,var(--primary),var(--accent));color:#fff;border-radius:20px;
  min-height:170px;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
  font-family:var(--font-display);font-size:1.1rem;cursor:pointer;box-shadow:var(--shadow-lg);position:relative;
}
.flash-card .fc-tag{position:absolute;top:12px;left:14px;font-family:var(--font-body);font-size:0.62rem;opacity:.8;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.timer-display{font-family:var(--font-mono);font-size:3.4rem;text-align:center;font-weight:700;letter-spacing:.02em;margin:18px 0 6px;}
.timer-ring-wrap{display:flex;justify-content:center;margin:10px 0;position:relative;}
.heatmap{display:grid;grid-template-columns:repeat(15,1fr);gap:3px;}
.heat-cell{aspect-ratio:1;border-radius:3px;background:var(--border);}
.confetti-piece{position:fixed;top:-10px;width:8px;height:8px;z-index:300;pointer-events:none;}
.streak-flame{display:flex;align-items:center;gap:5px;}
.weekday-strip{display:flex;gap:6px;justify-content:space-between;margin-top:10px;}
.wd-item{flex:1;text-align:center;font-size:0.62rem;color:var(--text-faint);font-weight:700;}
.wd-dot{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin:4px auto 3px;font-size:0.68rem;color:var(--text-dim);font-weight:800;}
.wd-dot.done{background:var(--success);color:#fff;}
.tag-chip{display:inline-flex;align-items:center;gap:4px;background:var(--border);padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;margin:3px 4px 0 0;}
.tag-chip.weak{background:rgba(198,40,40,0.12);color:var(--danger);}
.tag-chip.strong{background:rgba(46,125,50,0.12);color:var(--success);}
.tag-chip button{background:none;border:none;color:inherit;cursor:pointer;margin-left:2px;padding:0;display:flex;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app">
  <header class="topbar">
    <div class="brand" id="brandHome" style="cursor:pointer">
      <div class="brand-mark"></div>
      <div class="brand-name">Prelims Path</div>
    </div>
    <button class="topbar-btn" id="btnSearchToggle" aria-label="Search">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

function buildMultiSequence(keys){

  while(more){

/* Zero-based index of a date among the non-Sunday days of its plan-month (clipped to START_DATE) */
function weekdayIndexInMonth(dateStr){
  const d = parseISO(dateStr);
  let firstOfMonth = new Date(d.getFullYear(), d.getMonth(), 1);
  if(firstOfMonth < START_DATE) firstOfMonth = new Date(START_DATE);
  let count = 0, cur = new Date(firstOfMonth);
  while(cur <= d){
    if(cur.getDay() !== 0) count++;
    cur = addDays(cur, 1);
  }
  return count - 1;
}
function isLastDayOfMonth(dateStr){

}

let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    console.error('Failed to load state, using defaults', e);
    return defaultState();
  }
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
  }catch(e){ console.error('Save failed', e); }
}
function getDay(dateStr){
  if(!STATE.days[dateStr]) STATE.days[dateStr] = {done:{}, notes:'', studyMinutes:0};
  return STATE.days[dateStr];
}
function getSubjectProgress(key){
  if(!STATE.subjectProgress[key]) STATE.subjectProgress[key] = {chapterDone:[], notes:'', weak:[], strong:[]};
  return STATE.subjectProgress[key];
}

/* ============================================================================
   DATE UTILITIES
   ============================================================================ */
function fmtISO(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseISO(s){ return new Date(s+'T00:00:00'); }
function addDays(d, n){ return new Date(d.getTime() + n*DAY_MS); }
function todayDate(){ const t = new Date(); return new Date(t.getFullYear(), t.getMonth(), t.getDate()); }
function todayISO(){ return fmtISO(todayDate()); }
function dayIndexOf(dateStr){
  return Math.round((parseISO(dateStr) - START_DATE) / DAY_MS);
}
function isWithinPlan(dateStr){
  const idx = dayIndexOf(dateStr);
  return idx >= 0 && idx < TOTAL_DAYS;
}
function fmtHuman(dateStr){
  const d = parseISO(dateStr);
  return DOW[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function fmtShort(dateStr){
  const d = parseISO(dateStr);
  return d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3);
}
function daysRemaining(){
  const t = todayDate();
  return Math.max(0, Math.ceil((EXAM_DATE - t)/DAY_MS));
}
function planProgressPct(){
  const idx = dayIndexOf(todayISO());
  const clamped = Math.min(Math.max(idx,0), TOTAL_DAYS-1);
  return Math.round((clamped/(TOTAL_DAYS-1))*100);
}

/* ============================================================================
   SCHEDULE ENGINE (revision-phase fallback) — weighted round-robin across
   all subjects, proportional to UPSC weightage. Used only in the March/April/
   May full-syllabus-revision months, where "study" cycles the whole syllabus.
   ============================================================================ */
let SCHEDULE = null; // array[TOTAL_DAYS] of {subjectKey, chapterIndex}
function buildSchedule(){
  if(SCHEDULE) return SCHEDULE;
  const entries = SUBJECT_KEYS.map(k=>({key:k, weight:SUBJECTS[k].weight}));
  const totalWeight = entries.reduce((a,e)=>a+e.weight,0);
  const acc = {}; entries.forEach(e=>acc[e.key]=0);
  const chapterPtr = {}; entries.forEach(e=>chapterPtr[e.key]=0);
  const out = [];
  for(let i=0;i<TOTAL_DAYS;i++){
    entries.forEach(e=>acc[e.key]+=e.weight);
    let best = entries[0];
    for(const e of entries){ if(acc[e.key] > acc[best.key]) best = e; }
    acc[best.key] -= totalWeight;
    const chapters = SUBJECTS[best.key].chapters;
    const cIdx = chapterPtr[best.key] % chapters.length;
    chapterPtr[best.key]++;
    out.push({subjectKey:best.key, chapterIndex:cIdx});
  }
  SCHEDULE = out;
  return out;
}

/* ============================================================================
   MENTOR TIMELINE ENGINE
   Builds ONE continuous daily timeline (study → notes → MCQs → revision →
   current affairs → gym → mains → reflection) exactly as a human mentor
   would hand it to you — not separate disconnected task lists.
   ============================================================================ */
function getDayTimeline(dateStr){
  if(!isWithinPlan(dateStr)) return null;
  const d = parseISO(dateStr);
  const isSunday = d.getDay() === 0;
  const cfg = getMonthConfig(dateStr);
  const idx = dayIndexOf(dateStr);
  const dow = d.getDay();
  const isAnthroDay = dow === 2 || dow === 5; // Tue / Fri — optional subject slot

  if(isSunday) return buildSundayTimeline(dateStr, cfg);

  let subjectKey, chapterIndex, title, points, focusLabel;
  if(cfg.mode === 'revision' || cfg.mode === 'final'){
    const rot = buildSchedule();
    const slot = rot[idx % rot.length];
    subjectKey = slot.subjectKey; chapterIndex = slot.chapterIndex;
    title = SUBJECTS[subjectKey].chapters[chapterIndex];
    points = [title];
    focusLabel = cfg.focusLabel;
  } else {
    const seq = cfg.sequence;
    const wIdx = weekdayIndexInMonth(dateStr);
    const item = seq[((wIdx % seq.length) + seq.length) % seq.length];
    subjectKey = item.subjectKey; chapterIndex = item.chapterIndex;
    title = item.title; points = item.points || [item.title];
    focusLabel = cfg.focusLabel;
  }
  const subjName = SUBJECTS[subjectKey] ? SUBJECTS[subjectKey].name : subjectKey;
  const book = bookFor(subjectKey);
  const mainsAdvanced = cfg.mainsAdvanced;

  const blocks = [
    { id:'study', time:'08:00 – 10:30', type:'study', icon:'book',
      title:`${subjName}: ${title}`, points, target:'Understand — not memorise.',
      book, subjectKey, chapterIndex },
    { id:'notes', time:'10:50 – 13:00', type:'notes', icon:'edit',
      title:'Make structured notes', points:['Condense today\'s concept into your own short notes','Use diagrams / flowcharts wherever it helps recall'] },
    { id:'mcq', time:'14:00 – 16:00', type:'mcq', icon:'target',
      title:`MCQ Practice — ${subjName}`, points:['20–30 topic-wise MCQs from today\'s concept','Log your score — weak topics (<70%) are auto-flagged'],
      subjectKey, chapterTitle:title },
    { id:'revision', time:'16:00 – 17:00', type:'revision', icon:'repeat',
      title:'Spaced Revision', points:['Clear everything due today (auto-scheduled at 1/7/15/30/60/90 days)'] },
    { id:'ca', time:'17:00 – 18:00', type:'ca', icon:'news',
      title:'Current Affairs', points:['Daily newspaper / compilation + notes','Tag entries to today\'s static topic where relevant'] },
    { id:'gym', time:PROFILE.gym.start+' – '+PROFILE.gym.end, type:'gym', icon:'heart',
      title:'Gym', fixed:true, points:['Fixed block — protect this hour every day'] },
    { id:'mains10', time:'19:30 – 20:15', type:'mains', icon:'pen',
      title:'Mains Answer Writing — 10 Marker', points:['~150 words in ~9 minutes','Question drawn from today\'s topic'], marks:10, subjectKey }
  ];
  if(mainsAdvanced && idx % 2 === 0){
    blocks.push({ id:'mains15', time:'20:15 – 21:00', type:'mains', icon:'pen',
      title:'Mains Answer Writing — 15 Marker', points:['~250 words in ~13 minutes','Alternate-day question — integrated slowly as per plan'], marks:15, subjectKey });
  }
  if(isAnthroDay){
    blocks.push({ id:'anthro', time:'21:00 – 21:45', type:'anthro', icon:'shield',
      title:`Anthropology (Optional) — ${(Math.floor(idx/7)%2===0)?'Paper I':'Paper II'}`,
      points:['Dedicated optional-subject slot — Tue & Fri'],
      paper: (Math.floor(idx/7)%2===0) ? 'paper1' : 'paper2' });
  }
  blocks.push({ id:'reflection', time: isAnthroDay ? '21:45 – 22:00' : '21:00 – 21:15', type:'reflection', icon:'check',
    title:'Daily Reflection', points:['What went well today? What will you fix tomorrow?'] });

  if(isLastDayOfMonth(dateStr)){
    blocks.push({ id:'monthlyReview', time:'22:00 – 22:20', type:'review', icon:'chart',
      title:'Monthly Review', points:['Review the whole month\'s completion %, weak topics & mock trend'] });
  }

  return { dateStr, monthLabel:cfg.label, focusLabel, isSunday:false, dayIndex:idx, blocks };
}

function buildSundayTimeline(dateStr, cfg){
  return {
    dateStr, monthLabel:cfg.label, focusLabel:'Sunday — Half Day', isSunday:true, dayIndex:dayIndexOf(dateStr),
    blocks:[
      { id:'sunRevision', time:'09:00 – 11:00', type:'revision', icon:'repeat',
        title:'Weekly Revision', points:['Revise everything studied this week, concept-first'] },
      { id:'sunTest', time:'11:00 – 13:00', type:'mcq', icon:'target',
        title:'Sunday Sectional Test', points:['Full sectional test on this week\'s subject','Vision IAS Test Series recommended'] },
      { id:'sunReview', time:'13:00 – 14:00', type:'review', icon:'chart',
        title:'Weekly Review', points:['Log weak topics into the Error Notebook','Plan focus areas for next week — rest of the day is yours'] }
    ]
  };
}

/* Tasks left incomplete on earlier days automatically resurface today — never deleted. */
function getCarryoverTasks(dateStr){
  const out = [];
  const carryTypes = ['study','notes','mcq','mains','ca'];
  let cur = addDays(parseISO(dateStr), -1);
  let scanned = 0;
  while(scanned < 60 && fmtISO(cur) >= START_DATE_STR){
    const ds = fmtISO(cur);
    const tl = getDayTimeline(ds);
    if(tl){
      const day = STATE.days[ds];
      tl.blocks.forEach(b=>{
        if(carryTypes.includes(b.type) && !(day && day.done && day.done[b.id])){
          out.push({ originDate:ds, block:b });
        }
      });
    }
    cur = addDays(cur, -1);
    scanned++;
  }
  return out;
}


/* Toggle a day's timeline block and cascade side-effects (chapter completion, revision scheduling, weak-topic checks, streak) */
function toggleDayTask(dateStr, taskId){
  const day = getDay(dateStr);
  const wasDone = !!day.done[taskId];
  day.done[taskId] = !wasDone;
  if(taskId === 'study' && !wasDone){
    const tl = getDayTimeline(dateStr);
    const block = tl && tl.blocks.find(b=>b.id==='study');
    if(block && block.subjectKey){
      markChapterDone(block.subjectKey, block.chapterIndex, true);
      const subjName = SUBJECTS[block.subjectKey] ? SUBJECTS[block.subjectKey].name : block.subjectKey;
      scheduleRevision(block.subjectKey, subjName, block.title.split(': ').slice(1).join(': ') || block.title, dateStr);
    }
  }
  updateStreak();
  saveState();
}
function markChapterDone(subjectKey, chapterIndex, val){
  const sp = getSubjectProgress(subjectKey);
  sp.chapterDone[chapterIndex] = val;
}
function scheduleRevision(subjectKey, subjectName, chapter, originDate){
  REVISION_OFFSETS.forEach(off=>{
    const due = fmtISO(addDays(parseISO(originDate), off));
    STATE.revisions.push({
      id: 'rev_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      subjectKey, subjectName, chapter, dueDate:due, done:false, originDate
    });
  });
}
/* Revisions due today or earlier (missed items auto-roll into "today") */
function getDueRevisions(dateStr){
  return STATE.revisions.filter(r => !r.done && r.dueDate <= dateStr);
}
function getUpcomingRevisions(dateStr, days){
  const until = fmtISO(addDays(parseISO(dateStr), days));
  return STATE.revisions.filter(r => !r.done && r.dueDate > dateStr && r.dueDate <= until);
}

/* ============================================================================
   WEAK TOPICS ENGINE — auto-detects weak areas from MCQ / PYQ / mock performance
   ============================================================================ */
function addWeakTopic(subjectKey, topic, reason){
  const subjectName = SUBJECTS[subjectKey] ? SUBJECTS[subjectKey].name : (subjectKey==='anthro_paper1'||subjectKey==='anthro_paper2' ? 'Anthropology' : (subjectKey||'General'));
  const existing = STATE.weakTopics.find(w=>w.subjectKey===subjectKey && w.topic===topic && !w.resolved);
  if(existing){ existing.reason = reason; existing.dateAdded = todayISO(); saveState(); return; }
  STATE.weakTopics.push({ id:uid('weak'), subjectKey, subjectName, topic, reason, dateAdded:todayISO(), resolved:false });
  REVISION_OFFSETS.slice(0,3).forEach(off=>{
    const due = fmtISO(addDays(todayDate(), off));
    STATE.revisions.push({ id:uid('rev'), subjectKey, subjectName, chapter:topic+' (weak topic)', dueDate:due, done:false, originDate:todayISO() });
  });
  showToast('⚠️ Added to Weak Topics — extra revision scheduled');
  saveState();
}
function resolveWeakTopic(id){
  const w = STATE.weakTopics.find(x=>x.id===id);
  if(w){ w.resolved = true; saveState(); showToast('Marked as improved'); }
}

/* ============================================================================
   MCQ PRACTICE LOG
   ============================================================================ */
function logMcqScore(dateStr, subjectKey, chapterTitle, correct, total){
  const accuracy = total>0 ? Math.round(correct/total*100) : 0;
  STATE.mcqLogs.push({ id:uid('mcq'), date:dateStr, subjectKey, chapterTitle, correct, total, accuracy });
  if(accuracy < 70){ addWeakTopic(subjectKey, chapterTitle, `MCQ accuracy ${accuracy}% (below 70%)`); }
  saveState();
}
function mcqLogsForDate(dateStr){ return STATE.mcqLogs.filter(m=>m.date===dateStr); }


/* ---------- Streak ---------- */
function dayHasActivity(dateStr){
  const day = STATE.days[dateStr];
  const habitDay = STATE.habits[dateStr];
  const dayActive = day && (Object.values(day.done||{}).some(Boolean) || (day.studyMinutes||0) > 0);
  const habitActive = habitDay && Object.values(habitDay).some(Boolean);
  return !!(dayActive || habitActive);
}
function updateStreak(){
  const t = todayDate();
  let cur = 0;
  let cursor = new Date(t);
  while(dayHasActivity(fmtISO(cursor))){
    cur++;
    cursor = addDays(cursor, -1);
  }
  STATE.streak.current = cur;
  if(cur > (STATE.streak.longest||0)) STATE.streak.longest = cur;
  STATE.streak.lastActiveDate = todayISO();
  checkBadges();
}
function checkBadges(){
  const milestones = [3,7,14,30,50,100];
  milestones.forEach(m=>{
    const id = 'streak_'+m;
    if(STATE.streak.current >= m && !STATE.badges.includes(id)){
      STATE.badges.push(id);
      showToast('🏅 Badge unlocked: '+m+'-day streak!');
      fireConfetti();
    }
  });
}

/* ---------- Study minutes today ---------- */
function addStudyMinutes(mins){
  const day = getDay(todayISO());
  day.studyMinutes = (day.studyMinutes||0) + mins;
  STATE.timerLogs.push({date:todayISO(), minutes:mins, type:'session'});
  updateStreak();
  saveState();
}
function studyMinutesForDate(dateStr){
  const day = STATE.days[dateStr];
  return day ? (day.studyMinutes||0) : 0;
}
function studyMinutesRange(startStr, endStr){
  let total = 0;
  let d = parseISO(startStr);
  const end = parseISO(endStr);
  while(d <= end){
    total += studyMinutesForDate(fmtISO(d));
    d = addDays(d,1);
  }
  return total;
}

/* ---------- Confetti ---------- */
function fireConfetti(){
  const colors = ['#0D47A1','#1976D2','#2E7D32','#F9A825','#C62828'];
  for(let i=0;i<40;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[i%colors.length];
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(p);
    const duration = 1800 + Math.random()*1400;
    const drift = (Math.random()-0.5)*160;
    p.animate([
      {transform:`translate(0,0) rotate(0deg)`, opacity:1},
      {transform:`translate(${drift}px, 100vh) rotate(${360+Math.random()*360}deg)`, opacity:0.9}
    ], {duration, easing:'cubic-bezier(.25,.46,.45,.94)'});
    setTimeout(()=>p.remove(), duration+50);
  }
}

/* ---------- Simple canvas charts (no external libs) ---------- */
function drawBarChart(canvas, labels, values, color){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const max = Math.max(1, ...values);
  const padBottom = 22, padTop = 10;
  const barW = w/values.length;
  const textColor = getComputedStyle(document.body).getPropertyValue('--text-faint').trim();
  values.forEach((v,i)=>{
    const bh = ((h-padBottom-padTop) * (v/max));
    const x = i*barW + barW*0.22;
    const bw = barW*0.56;
    const y = h - padBottom - bh;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.9;
    roundRect(ctx, x, y, bw, bh, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = textColor;
    ctx.font = '10px Manrope, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], x+bw/2, h-6);
  });
}
function drawLineChart(canvas, labels, values, color){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const max = Math.max(1, ...values), min = Math.min(0, ...values);
  const padB=20, padT=10, padL=6, padR=6;
  const stepX = (w-padL-padR)/Math.max(1,values.length-1);
  ctx.beginPath();
  values.forEach((v,i)=>{
    const x = padL + i*stepX;
    const y = padT + (h-padT-padB) * (1 - (v-min)/((max-min)||1));
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 2.4; ctx.lineJoin='round'; ctx.stroke();
  // fill
  ctx.lineTo(padL+(values.length-1)*stepX, h-padB);
  ctx.lineTo(padL, h-padB);
  ctx.closePath();
  ctx.fillStyle = color+'22';
  ctx.fill();
  const textColor = getComputedStyle(document.body).getPropertyValue('--text-faint').trim();
  ctx.fillStyle = textColor; ctx.font='10px Manrope, sans-serif'; ctx.textAlign='center';
  labels.forEach((l,i)=>{ if(i%Math.ceil(labels.length/6||1)===0) ctx.fillText(l, padL+i*stepX, h-4); });
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function uid(prefix){ return (prefix||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function overallCompletionPct(){
  let doneCh = 0, totalCh = 0;
  SUBJECT_KEYS.forEach(k=>{
    const sp = getSubjectProgress(k);
    totalCh += SUBJECTS[k].chapters.length;
    doneCh += (sp.chapterDone||[]).filter(Boolean).length;
  });
  const ap1 = STATE.anthroProgress.paper1, ap2 = STATE.anthroProgress.paper2;
  totalCh += ANTHRO.paper1.chapters.length + ANTHRO.paper2.chapters.length;
  doneCh += (ap1.chapterDone||[]).filter(Boolean).length + (ap2.chapterDone||[]).filter(Boolean).length;
  return totalCh? Math.round(doneCh/totalCh*100) : 0;
}
/* Weakest subject: most unresolved Weak Topics entries, falls back to lowest completion% among started subjects */
function weakestSubject(){
  const open = STATE.weakTopics.filter(w=>!w.resolved);
  if(open.length){
    const counts = {};
    open.forEach(w=>{ counts[w.subjectName] = (counts[w.subjectName]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  }
  let worst = null, worstPct = 101;
  SUBJECT_KEYS.forEach(k=>{
    const c = subjectCompletion(k);
    if(c.done>0 && c.pct < worstPct){ worstPct = c.pct; worst = SUBJECTS[k].name; }
  });
  return worst;
}

function toggleSubjectChapter(key,i){
  const sp = getSubjectProgress(key);
  const wasDone = !!sp.chapterDone[i];
  sp.chapterDone[i] = !wasDone;
  if(!wasDone){ scheduleRevision(key, SUBJECTS[key].name, SUBJECTS[key].chapters[i], todayISO()); showToast('Chapter marked complete · revision scheduled'); }
  updateStreak(); saveState(); renderSubjectDetail(key);
}
function addTag(key, type){
  const input = document.getElementById(`${type}Input-${key}`);
  const val = input.value.trim();
  if(!val) return;
  const sp = getSubjectProgress(key);
  sp[type] = sp[type]||[];
  sp[type].push(val);
  input.value='';
  saveState(); renderSubjectDetail(key);
}
function removeTag(key,type,i){
  const sp = getSubjectProgress(key);
  sp[type].splice(i,1);
  saveState(); renderSubjectDetail(key);
}
function saveSubjectNotes(key){
  const sp = getSubjectProgress(key);
  sp.notes = document.getElementById(`subjNotes-${key}`).value;
  saveState(); showToast('Notes saved');
}

/* ============================================================================
   SCREEN: STUDY TIMER (Pomodoro / Stopwatch / Focus / Break)
   ============================================================================ */
let TIMER_MODE = 'pomodoro'; // pomodoro | stopwatch | focus | break
let TIMER_STATE = { running:false, remaining:25*60, elapsed:0, intervalId:null, sessionMins:25 };
const TIMER_PRESETS = { pomodoro:25*60, focus:50*60, break:5*60 };

function renderTimer(){
  const el = document.getElementById('screen-timer');
  const isCountdown = TIMER_MODE !== 'stopwatch';
  const displaySecs = isCountdown ? TIMER_STATE.remaining : TIMER_STATE.elapsed;
  const mm = String(Math.floor(displaySecs/60)).padStart(2,'0');
  const ss = String(displaySecs%60).padStart(2,'0');
  const total = isCountdown ? TIMER_STATE.sessionMins*60 : Math.max(displaySecs,1);
  const ringR = 80, ringC = 2*Math.PI*ringR;
  const frac = isCountdown ? (1 - TIMER_STATE.remaining/total) : 0;

  el.innerHTML = `
    <div class="screen-header"><h2>Study Timer</h2><p>Pomodoro · Stopwatch · Focus Mode · Break Timer</p></div>
    <div class="tabbar">
      ${['pomodoro','stopwatch','focus','break'].map(m=>`<div class="tabchip ${TIMER_MODE===m?'active':''}" onclick="switchTimerMode('${m}')">${m[0].toUpperCase()+m.slice(1)}</div>`).join('')}
    </div>
    <div class="card" style="text-align:center;padding:24px 14px">
      <div class="timer-ring-wrap">
        <svg width="180" height="180">
          <circle cx="90" cy="90" r="${ringR}" stroke="var(--border)" stroke-width="10" fill="none"/>
          ${isCountdown?`<circle cx="90" cy="90" r="${ringR}" stroke="var(--accent)" stroke-width="10" fill="none" stroke-linecap="round"
            stroke-dasharray="${ringC}" stroke-dashoffset="${ringC*(1-frac)}" transform="rotate(-90 90 90)"/>`:
            `<circle cx="90" cy="90" r="${ringR}" stroke="var(--accent)" stroke-width="10" fill="none" stroke-linecap="round"
            stroke-dasharray="${ringC}" stroke-dashoffset="0" transform="rotate(-90 90 90)" opacity="0.5"/>`}
        </svg>
        <div class="timer-display" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;font-size:2.1rem">${mm}:${ss}</div>
      </div>
      ${TIMER_MODE==='pomodoro'||TIMER_MODE==='focus'||TIMER_MODE==='break'?`
      <div style="display:flex;gap:8px;justify-content:center;margin:10px 0 16px">
        ${(TIMER_MODE==='pomodoro'?[15,25,45]:TIMER_MODE==='focus'?[25,50,90]:[5,10,15]).map(m=>`<button class="btn btn-sm ${TIMER_STATE.sessionMins===m?'btn-accent':'btn-outline'}" onclick="setTimerPreset(${m})">${m}m</button>`).join('')}
      </div>`:''}
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px">
        <button class="btn btn-primary" onclick="timerToggle()">${TIMER_STATE.running?icon('pause',16):icon('play',16)} ${TIMER_STATE.running?'Pause':'Start'}</button>
        <button class="btn btn-ghost" onclick="timerReset()">${icon('reset',16)} Reset</button>
      </div>
    </div>
    <div class="section-title">Today's study hours</div>
    <div class="card row-between">
      <div><div class="stat-val" style="font-size:1.4rem">${(studyMinutesForDate(todayISO())/60).toFixed(1)}h</div><div class="stat-label">logged today</div></div>
      <div class="streak-flame" style="color:var(--warning)">${icon('flame',20)}<b>${STATE.streak.current} day streak</b></div>
    </div>
    <div class="section-title">Weekly graph</div>
    <div class="card"><canvas id="timerWeekChart" style="width:100%;height:110px"></canvas></div>
    <div class="section-title">Monthly graph</div>
    <div class="card"><canvas id="timerMonthChart" style="width:100%;height:110px"></canvas></div>
  `;
  const weekLabels=[], weekVals=[];
  for(let i=6;i>=0;i--){ const d=addDays(todayDate(),-i); weekLabels.push(DOW[d.getDay()]); weekVals.push(Math.round(studyMinutesForDate(fmtISO(d))/6)/10); }
  drawBarChart(document.getElementById('timerWeekChart'), weekLabels, weekVals, '#1976D2');
  const monthLabels=[], monthVals=[];
  for(let i=29;i>=0;i-=3){ const d=addDays(todayDate(),-i); monthLabels.push(String(d.getDate())); monthVals.push(Math.round(studyMinutesForDate(fmtISO(d))/6)/10); }
  drawLineChart(document.getElementById('timerMonthChart'), monthLabels, monthVals, '#2E7D32');
}
function switchTimerMode(m){
  timerPause();
  TIMER_MODE = m;
  TIMER_STATE.sessionMins = m==='stopwatch'?0:(m==='pomodoro'?25:m==='focus'?50:5);
  TIMER_STATE.remaining = TIMER_STATE.sessionMins*60;
  TIMER_STATE.elapsed = 0;
  renderTimer();
}
function setTimerPreset(m){
  TIMER_STATE.sessionMins = m; TIMER_STATE.remaining = m*60; renderTimer();
}
function timerToggle(){ TIMER_STATE.running ? timerPause() : timerStart(); }
function timerStart(){
  if(TIMER_STATE.running) return;
  TIMER_STATE.running = true;
  TIMER_STATE.intervalId = setInterval(()=>{
    if(TIMER_MODE==='stopwatch'){ TIMER_STATE.elapsed++; }
    else{
      TIMER_STATE.remaining--;
      if(TIMER_STATE.remaining<=0){
        timerPause();
        addStudyMinutes(TIMER_STATE.sessionMins);
        showToast(TIMER_MODE==='break' ? 'Break over! Back to focused study.' : '⏰ Session complete — great work!');
        if(TIMER_MODE!=='break') fireConfetti();
        TIMER_STATE.remaining = TIMER_STATE.sessionMins*60;
      }
    }
    if(CURRENT_SCREEN==='timer') updateTimerDisplayOnly();
  }, 1000);
  renderTimer();
}
function timerPause(){
  TIMER_STATE.running = false;
  clearInterval(TIMER_STATE.intervalId);
  if(CURRENT_SCREEN==='timer') renderTimer();
}
function timerReset(){
  timerPause();
  TIMER_STATE.remaining = TIMER_STATE.sessionMins*60;
  TIMER_STATE.elapsed = 0;
  if(TIMER_MODE==='stopwatch' && TIMER_STATE.elapsed>0){ addStudyMinutes(Math.round(TIMER_STATE.elapsed/60)); }
  renderTimer();
}
function updateTimerDisplayOnly(){
  const disp = document.querySelector('.timer-display');
  if(!disp) return;
  const secs = TIMER_MODE==='stopwatch' ? TIMER_STATE.elapsed : TIMER_STATE.remaining;
  disp.textContent = String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');
  const ringR=80, ringC=2*Math.PI*ringR;
  const total = TIMER_STATE.sessionMins*60||1;
  const frac = TIMER_MODE==='stopwatch' ? 0 : (1-TIMER_STATE.remaining/total);
  const circles = document.querySelectorAll('.timer-ring-wrap svg circle');
  if(circles[1]) circles[1].setAttribute('stroke-dashoffset', ringC*(1-frac));
}

      </div>
    </div>
    <div class="section-title">Subject completion</div>
    <div class="card"><canvas id="statSubjChart" style="width:100%;height:170px"></canvas></div>
    <div class="section-title">MCQ accuracy trend</div>
    <div class="card"><canvas id="statMcqChart" style="width:100%;height:120px"></canvas></div>
    <div class="section-title">Mock accuracy trend <span class="tag">avg ${avgAccuracy}%</span></div>
    <div class="card"><canvas id="statAccChart" style="width:100%;height:120px"></canvas></div>
    <div class="section-title">Consistency heatmap <span class="tag">last 90 days</span></div>
    <div class="card">
      <div class="heatmap">
        ${heatDays.map(ds=>{
          const mins = studyMinutesForDate(ds);
          const intensity = mins===0?0: mins<30?1: mins<60?2: mins<120?3:4;
          const colors=['var(--border)','#a5c8f0','#6fa8e0','#3b7dc4','#0D47A1'];
          return `<div class="heat-cell" title="${ds}: ${mins}min" style="background:${colors[intensity]}"></div>`;
        }).join('')}
      </div>
    </div>
  `;
  const subjLabels = SUBJECT_KEYS.map(k=>SUBJECTS[k].name.slice(0,4));
  const subjVals = SUBJECT_KEYS.map(k=>subjectCompletion(k).pct);
  drawBarChart(document.getElementById('statSubjChart'), subjLabels, subjVals, '#0D47A1');
  const mcqSorted = STATE.mcqLogs.slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(mcqSorted.length){
    drawLineChart(document.getElementById('statMcqChart'), mcqSorted.map(m=>fmtShort(m.date)), mcqSorted.map(m=>m.accuracy), '#2E7D32');
  }
  const accSorted = STATE.mockTests.slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(accSorted.length){
    drawLineChart(document.getElementById('statAccChart'), accSorted.map(m=>fmtShort(m.date)), accSorted.map(m=>m.accuracy), '#F9A825');
  }
}
function computeReadiness(){
  const compPct = overallCompletionPct();
  const revTotal = STATE.revisions.length;
  const revPct = revTotal? Math.round(STATE.revisions.filter(r=>r.done).length/revTotal*100) : 50;
  const avgAcc = STATE.mockTests.length? Math.round(STATE.mockTests.reduce((a,m)=>a+m.accuracy,0)/STATE.mockTests.length) : 40;
  const streakScore = Math.min(100, (STATE.streak.current||0)*4);
  return Math.round(compPct*0.35 + revPct*0.25 + avgAcc*0.25 + streakScore*0.15);
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', STATE.theme==='dark'?'dark':'light');
  const a = ACCENT_OPTIONS[STATE.accent]||ACCENT_OPTIONS.accent1;
  document.documentElement.style.setProperty('--primary', a.primary);
  document.documentElement.style.setProperty('--accent', a.accent);
  const scale = STATE.fontSize==='sm'?0.92:STATE.fontSize==='lg'?1.12:1;

function exportData(){
  const blob = new Blob([JSON.stringify(STATE,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'prelims-path-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup exported');
}
function importData(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      STATE = Object.assign(defaultState(), parsed);
      SCHEDULE = null;
      saveState(); applyTheme(); showToast('Data restored'); navigate('home');
    }catch(err){ showToast('Invalid backup file'); }
  };
  reader.readAsText(file);
}

  const hits = [];
  STATE.currentAffairs.forEach(i=>{
    if((i.title+' '+i.notes).toLowerCase().includes(ql)) hits.push({label:i.title, meta:'Current Affairs · '+fmtShort(i.date), action:`openViewCA('${i.id}')`});
  });
  STATE.pyq.forEach(p=>{
    if((p.topic+' '+p.subject).toLowerCase().includes(ql)) hits.push({label:p.year+' · '+p.topic, meta:'PYQ · '+p.subject, action:`navigate('pyq')`});
  });
  STATE.flashcards.forEach(f=>{
    if((f.front+' '+f.back).toLowerCase().includes(ql)) hits.push({label:f.front, meta:'Flashcard · '+f.subject, action:`navigate('flashcards')`});
  });
  SUBJECT_KEYS.forEach(k=>{
    const sp = getSubjectProgress(k);
    if((sp.notes||'').toLowerCase().includes(ql)) hits.push({label:SUBJECTS[k].name+' notes', meta:'Subject notes', action:`navigate('subjectDetail','${k}')`});
    SUBJECTS[k].chapters.forEach(ch=>{
      if(ch.toLowerCase().includes(ql)) hits.push({label:ch, meta:SUBJECTS[k].name, action:`navigate('subjectDetail','${k}')`});
    });
  });
  STATE.answerWriting.forEach(a=>{
    if((a.question||'').toLowerCase().includes(ql)) hits.push({label:a.question, meta:'Answer Writing · '+fmtShort(a.date), action:`navigate('answerwriting')`});
  });
  STATE.errorNotebook.forEach(e=>{
    if((e.question+' '+e.wrongConcept+' '+e.correctConcept).toLowerCase().includes(ql)) hits.push({label:e.question, meta:'Error Notebook · '+e.subject, action:`openViewError('${e.id}')`});
  });
  STATE.weakTopics.forEach(w=>{
    if((w.topic+' '+w.subjectName).toLowerCase().includes(ql)) hits.push({label:w.topic, meta:'Weak Topic · '+w.subjectName, action:`navigate('weaktopics')`});
  });
  if((STATE.globalNotes||'').toLowerCase().includes(ql)) hits.push({label:'Global Notes match', meta:'Notes', action:`openGlobalNotes()`});
  if((STATE.formulaSheet||'').toLowerCase().includes(ql)) hits.push({label:'Formula Sheet match', meta:'Notes', action:`openFormulaSheet()`});

  box.innerHTML = hits.length ? hits.slice(0,20).map(h=>`
    <div class="search-hit" onclick="${h.action}"><b>${esc(h.label)}</b><div class="sh-meta">${esc(h.meta)}</div></div>
  `).join('') : `<div class="search-hit"><span class="muted">No matches found</span></div>`;
}

/* ---------- Theme toggle button (topbar quick toggle) ---------- */
document.getElementById('btnThemeToggle').addEventListener('click', ()=>{
  toggleDarkMode(STATE.theme !== 'dark');
});

/* ============================================================================
   INIT
   ============================================================================ */
function init(){
  applyTheme();
  buildSchedule();
  updateStreak();
  saveState();
  navigate('home');
  // Re-render active timer screen every second is handled by timer interval itself.
  // Register minimal service worker for offline caching if supported.
  if('serviceWorker' in navigator){
    try{
      const swCode = `
        const CACHE='prelims-path-v1';
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => self.clients.claim());
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.open(CACHE).then(cache =>
              cache.match(e.request).then(resp => resp || fetch(e.request).then(netResp => {
                if(e.request.method==='GET') cache.put(e.request, netResp.clone());
                return netResp;
              }).catch(()=>resp))
            )
          );
        });
      `;
      const blob = new Blob([swCode], {type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
    }catch(e){ /* offline registration best-effort only */ }
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
